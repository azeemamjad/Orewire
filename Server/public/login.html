<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in | OreWire Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&family=Source+Serif+4:opsz,wght@8..60,700;8..60,800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:         #f7f3ec;
    --surface:    #ffffff;
    --border:     #d8d2c6;
    --accent:     #14233f;
    --accent-gold:#d4a12a;
    --accent-gold-h: #b07d1a;
    --text:       #1a2541;
    --muted:      #6b6560;
    --danger:     #b91c1c;
    --radius:     8px;
    --font-sans:  'Inter', system-ui, sans-serif;
    --font-display: 'Source Serif 4', Georgia, serif;
    --font-mono:  'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-family: var(--font-sans);
    color: var(--text);
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(212, 161, 42, 0.12), transparent 55%),
      radial-gradient(ellipse 70% 50% at 90% 100%, rgba(20, 35, 63, 0.08), transparent 50%),
      var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  .shell { width: 100%; max-width: 440px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px 28px;
    box-shadow: 0 8px 32px rgba(20, 35, 63, 0.08);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .brand-mark {
    position: relative;
    width: 40px;
    height: 40px;
    background: var(--accent);
    color: #fff;
    display: grid;
    place-items: center;
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .brand-mark::after {
    content: '';
    position: absolute;
    right: -2px;
    bottom: -2px;
    width: 7px;
    height: 7px;
    border-radius: 999px;
    background: #15803d;
  }
  .brand-text strong {
    display: block;
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.03em;
  }
  .brand-text span {
    display: block;
    margin-top: 3px;
    font-family: var(--font-mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
  }
  h1 {
    font-family: var(--font-display);
    font-size: clamp(24px, 5vw, 30px);
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .lead {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  label {
    display: block;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 8px;
  }
  input[type=password] {
    width: 100%;
    height: 46px;
    padding: 0 14px;
    background: #faf7f1;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input[type=password]:focus {
    border-color: var(--accent-gold);
    box-shadow: 0 0 0 3px rgba(212, 161, 42, 0.15);
  }
  button[type=submit] {
    width: 100%;
    height: 46px;
    margin-top: 18px;
    background: var(--accent-gold);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s;
  }
  button[type=submit]:hover { background: var(--accent-gold-h); }
  .error {
    margin-top: 16px;
    padding: 10px 14px;
    background: rgba(185, 28, 28, 0.08);
    color: var(--danger);
    border: 1px solid rgba(185, 28, 28, 0.2);
    border-radius: 6px;
    font-size: 13px;
  }
  .footer {
    margin-top: 22px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }
  @media (max-width: 480px) {
    body { padding: 14px; align-items: flex-start; padding-top: 28px; }
    .card { padding: 24px 20px 22px; }
  }
</style>
</head>
<body>
<div class="shell">
  <form class="card" method="post" action="/admin/login">
    <div class="brand">
      <div class="brand-mark">O</div>
      <div class="brand-text">
        <strong>OreWire Admin</strong>
        <span>Mining intelligence operations</span>
      </div>
    </div>

    <h1>Welcome back</h1>
    <p class="lead">Sign in to manage companies, filings, scrapers, and pipeline jobs.</p>

    <label for="password">Admin password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" autofocus required />

    <input type="hidden" name="next" id="next-input" />

    <div id="err" class="error" style="display:none;">That password didn&rsquo;t work. Please try again.</div>

    <button type="submit">Continue to admin</button>

    <div class="footer">OreWire &middot; Editorial intelligence</div>
  </form>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  if (params.get('error') === '1') document.getElementById('err').style.display = 'block';
  const nextVal = params.get('next');
  if (nextVal) document.getElementById('next-input').value = nextVal;
</script>
</body>
</html>
