<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in | OreWire Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:         #f4f0e8;
    --surface:    #ffffff;
    --border:     #e3ddcd;
    --accent:     #0f1e3d;
    --accent-gold:#c9922a;
    --accent-gold-h: #b07d1a;
    --text:       #1a2541;
    --muted:      #6b6560;
    --danger:     #b91c1c;
    --radius:     12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    color: var(--text);
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(201, 146, 42, 0.12), transparent 55%),
      radial-gradient(ellipse 70% 50% at 90% 100%, rgba(15, 30, 61, 0.08), transparent 50%),
      var(--bg);
  }
  .shell { width: 100%; max-width: 420px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 32px 32px;
    box-shadow: 0 8px 32px rgba(15, 30, 61, 0.08);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .brand-mark {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: linear-gradient(145deg, var(--accent) 0%, #1a3058 100%);
    color: var(--accent-gold);
    display: grid;
    place-items: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .brand-text strong {
    display: block;
    font-size: 17px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.3px;
  }
  .brand-text span {
    font-size: 12px;
    color: var(--muted);
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .lead {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 26px;
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 8px;
  }
  input[type=password] {
    width: 100%;
    height: 46px;
    padding: 0 14px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input[type=password]:focus {
    border-color: var(--accent-gold);
    box-shadow: 0 0 0 3px rgba(201, 146, 42, 0.15);
  }
  button[type=submit] {
    width: 100%;
    height: 46px;
    margin-top: 18px;
    background: var(--accent-gold);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  button[type=submit]:hover { background: var(--accent-gold-h); }
  button[type=submit]:active { transform: scale(0.99); }
  .error {
    margin-top: 16px;
    padding: 10px 14px;
    background: rgba(185, 28, 28, 0.08);
    color: var(--danger);
    border: 1px solid rgba(185, 28, 28, 0.2);
    border-radius: 8px;
    font-size: 13px;
  }
  .footer {
    margin-top: 24px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="shell">
  <form class="card" method="post" action="/admin/login">
    <div class="brand">
      <div class="brand-mark">⛏</div>
      <div class="brand-text">
        <strong>OreWire</strong>
        <span>Mining intelligence admin</span>
      </div>
    </div>

    <h1>Welcome back</h1>
    <p class="lead">Sign in to manage companies, filings, scrapers, and pipeline jobs.</p>

    <label for="password">Admin password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" autofocus required />

    <input type="hidden" name="next" id="next-input" />

    <div id="err" class="error" style="display:none;">That password didn&rsquo;t work. Please try again.</div>

    <button type="submit">Continue to admin</button>

    <div class="footer">SEDAR+ filing tracker &middot; OreWire</div>
  </form>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  if (params.get('error') === '1') document.getElementById('err').style.display = 'block';
  const nextVal = params.get('next');
  if (nextVal) document.getElementById('next-input').value = nextVal;
</script>
</body>
</html>
