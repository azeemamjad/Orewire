<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — Mining Intel Admin</title>
<style>
  :root {
    --bg:       #0f172a;
    --surface:  #1e293b;
    --border:   #334155;
    --accent:   #3b82f6;
    --accent-h: #2563eb;
    --text:     #e2e8f0;
    --muted:    #94a3b8;
    --danger:   #ef4444;
    --radius:   8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh; display: grid; place-items: center; padding: 24px;
  }
  .card {
    width: 100%; max-width: 380px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 32px;
  }
  .brand { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; color: var(--accent); font-weight: 700; font-size: 16px; }
  .brand small { color: var(--muted); font-weight: 400; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; }
  h1 { font-size: 22px; font-weight: 700; margin: 12px 0 4px; }
  p.lead { color: var(--muted); font-size: 13px; margin-bottom: 22px; }
  label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  input[type=password] {
    width: 100%; height: 42px; padding: 0 12px;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 14px; outline: none;
  }
  input[type=password]:focus { border-color: var(--accent); }
  button {
    width: 100%; height: 42px; margin-top: 14px;
    background: var(--accent); color: #fff; border: none; border-radius: 6px;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button:hover { background: var(--accent-h); }
  .error {
    margin-top: 14px; padding: 8px 12px;
    background: rgba(239, 68, 68, 0.12); color: var(--danger);
    border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 6px;
    font-size: 12px;
  }
  .footer { margin-top: 22px; font-size: 11px; color: var(--muted); text-align: center; }
</style>
</head>
<body>
<form class="card" method="post" action="/admin/login">
  <div class="brand">⛏ Mining Intel <small>Admin</small></div>
  <h1>Sign in</h1>
  <p class="lead">Enter the admin password to continue.</p>

  <label for="password">Password</label>
  <input id="password" name="password" type="password" autocomplete="current-password" autofocus required />

  <input type="hidden" name="next" id="next-input" />

  <div id="err" class="error" style="display:none;">Invalid password. Try again.</div>

  <button type="submit">Sign in</button>

  <div class="footer">Mining Intel · SEDAR+ Filing Tracker</div>
</form>
<script>
  const params = new URLSearchParams(window.location.search);
  if (params.get('error') === '1') document.getElementById('err').style.display = 'block';
  const nextVal = params.get('next');
  if (nextVal) document.getElementById('next-input').value = nextVal;
</script>
</body>
</html>
