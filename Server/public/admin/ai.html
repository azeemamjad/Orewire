<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI | OreWire Admin</title>
<link rel="stylesheet" href="/admin/css/admin.css" />
<style>
nav li a { color: inherit; text-decoration: none; display: flex; align-items: center; gap: 8px; width: 100%; }
.ai-actions { display: flex; flex-wrap: wrap; gap: 4px; }
.ai-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 16px 0 24px; }
.ai-stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.ai-stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
.ai-stat .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
.usage-error {
  font-size: 12px;
  color: #dc2626;
  max-width: 480px;
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.4;
}
</style>
</head>
<body data-page="ai">
<aside class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <h1>AI providers</h1>
    <p>LLM for filing analysis, snapshots, news enrichment, and upload validation — usage log kept <span id="ai-retention-days">3</span> days</p>
  </div>

  <div id="ai-env-banner" class="relay-proxy-banner" style="display:none;"></div>

  <div id="ai-active-label" style="font-size:13px;margin-bottom:12px;color:var(--muted);"></div>

  <div class="ai-stats" id="ai-stats" hidden>
    <div class="ai-stat"><div class="label">Requests</div><div class="value" id="ai-stat-requests">0</div></div>
    <div class="ai-stat"><div class="label">Errors</div><div class="value" id="ai-stat-errors">0</div></div>
    <div class="ai-stat"><div class="label">Prompt tokens</div><div class="value" id="ai-stat-prompt">0</div></div>
    <div class="ai-stat"><div class="label">Completion tokens</div><div class="value" id="ai-stat-completion">0</div></div>
  </div>

  <div class="toolbar">
    <button class="btn btn-primary btn-sm" type="button" onclick="openAiModal()">Edit config</button>
    <button class="btn btn-ghost btn-sm" type="button" onclick="testAiProvider()">Test</button>
    <button class="btn btn-ghost btn-sm" type="button" id="ai-set-default-btn" onclick="setAiDefault()" hidden>Set as default</button>
    <button class="btn btn-ghost btn-sm" type="button" onclick="loadAi()">Refresh</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Feature</th>
          <th>Model</th>
          <th>Status</th>
          <th>Duration</th>
          <th>Tokens</th>
          <th>Error</th>
          <th>When</th>
        </tr>
      </thead>
      <tbody id="ai-usage-body">
        <tr class="empty-row"><td colspan="7">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<div class="modal-backdrop" id="ai-modal" onclick="if(event.target===this)closeAiModal()">
  <div class="modal" style="max-width:520px;">
    <div class="modal-header">
      <h2>AI provider configuration</h2>
      <button class="modal-close" type="button" onclick="closeAiModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="ai-form" onsubmit="submitAi(event)">
        <input type="hidden" id="ai-id" value="" />
        <div class="form-grid" style="grid-template-columns:1fr;">
          <div class="config-field"><label for="ai-name">Name *</label><input id="ai-name" required placeholder="DeepSeek" /></div>
          <div class="config-field"><label for="ai-provider">Provider *</label>
            <select id="ai-provider">
              <option value="ollama">ollama</option>
              <option value="deepseek">deepseek</option>
            </select>
          </div>
          <div class="config-field"><label for="ai-host">Host *</label><input id="ai-host" required placeholder="https://api.deepseek.com" /></div>
          <div class="config-field"><label for="ai-model">Default model *</label><input id="ai-model" required placeholder="deepseek-v4-flash" /></div>
          <div class="config-field"><label for="ai-key">API key</label><input id="ai-key" type="password" autocomplete="new-password" placeholder="Leave blank to keep existing" /></div>
        </div>
        <label style="display:flex;align-items:center;gap:8px;margin:14px 0;font-size:14px;">
          <input type="checkbox" id="ai-enabled" checked /> Enabled
        </label>
        <label style="display:flex;align-items:center;gap:8px;margin:0 0 14px;font-size:14px;">
          <input type="checkbox" id="ai-is-default" /> Default provider
        </label>
        <div style="text-align:right;">
          <button type="button" class="btn btn-ghost btn-sm" onclick="closeAiModal()">Cancel</button>
          <button type="submit" class="btn btn-primary btn-sm">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="/admin/js/admin-sidebar.js"></script>
<script src="/admin/js/legacy-admin.js"></script>
</body>
</html>
