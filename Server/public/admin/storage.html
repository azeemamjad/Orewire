<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Storage | OreWire Admin</title>
<link rel="stylesheet" href="/admin/css/admin.css" />
<style>
nav li a { color: inherit; text-decoration: none; display: flex; align-items: center; gap: 8px; width: 100%; }
.storage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
.storage-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.storage-card .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.storage-card .value { font-size: 22px; font-weight: 700; }
.storage-card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
.conn-ok { color: #16a34a; }
.conn-fail { color: #dc2626; }
</style>
</head>
<body data-page="storage">
<aside class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <h1>Storage</h1>
    <p>AWS S3 filing PDFs — private bucket with presigned document access</p>
  </div>

  <div class="toolbar" style="margin-bottom:16px;">
    <button class="btn btn-ghost btn-sm" onclick="loadStorageSummary()">↻ Refresh</button>
    <span id="storage-updated" style="margin-left:auto;font-size:12px;color:var(--muted);"></span>
  </div>

  <div class="section-title">Connection</div>
  <div class="storage-grid" id="storage-conn-grid">
    <div class="storage-card"><div class="label">AWS S3</div><div class="value" id="conn-s3">—</div><div class="sub" id="conn-s3-sub"></div></div>
    <div class="storage-card"><div class="label">Access mode</div><div class="value" style="font-size:16px;" id="conn-mode">—</div><div class="sub" id="conn-mode-sub"></div></div>
  </div>

  <div class="section-title">Database (pdf_path)</div>
  <div class="storage-grid">
    <div class="storage-card"><div class="label">s3:</div><div class="value" id="db-s3">—</div></div>
    <div class="storage-card"><div class="label">https: (public)</div><div class="value" id="db-https">—</div></div>
    <div class="storage-card"><div class="label">Local paths</div><div class="value" id="db-local">—</div></div>
    <div class="storage-card"><div class="label">Legacy minio:</div><div class="value" id="db-legacy-minio">—</div></div>
  </div>

  <div class="section-title">Bucket volume</div>
  <div class="storage-grid">
    <div class="storage-card"><div class="label">S3 objects</div><div class="value" id="s3-objects">—</div><div class="sub" id="s3-bytes"></div></div>
  </div>
</main>
<div id="toast"></div>
<script src="/admin/js/cron-schedule.js"></script>
<script src="/admin/js/admin-sidebar.js?v=20260720"></script>
<script src="/admin/js/legacy-admin.js"></script>
</body>
</html>
