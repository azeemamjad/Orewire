<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact | OreWire Admin</title>
<link rel="stylesheet" href="/admin/css/admin.css" />
<style>
nav li a { color: inherit; text-decoration: none; display: flex; align-items: center; gap: 8px; width: 100%; }
</style>
</head>
<body data-page="contact-messages">
<aside class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <h1>Contact messages</h1>
    <p>Inquiries from the public Contact Us page. Click a row to read and mark as read.</p>
  </div>
  <div class="toolbar">
    <label class="text-muted" style="font-size:12px;font-weight:600;">Filter</label>
    <select id="contact-filter">
      <option value="all">All messages</option>
      <option value="unread">Unread only</option>
      <option value="read">Read only</option>
    </select>
    <button class="btn btn-ghost btn-sm" type="button" onclick="loadContactMessages()">↻ Refresh</button>
  </div>
  <div class="contact-layout">
    <div class="contact-list-wrap">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Subject</th>
              <th>From</th>
              <th>Received</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="contact-messages-body">
            <tr class="empty-row"><td colspan="4">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <div id="contact-detail">
      <div class="contact-detail-empty">Select a message to read details</div>
    </div>
  </div>
</main>
<div id="toast"></div>
<script src="/admin/js/admin-sidebar.js?v=20260720"></script>
<script src="/admin/js/legacy-admin.js"></script>
</body>
</html>
