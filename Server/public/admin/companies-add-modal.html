<div class="modal-backdrop" id="add-co-modal" onclick="if(event.target===this)closeAddCompanyModal()">
  <div class="modal" style="max-width:820px;">
    <div class="modal-header"><h2>Add Company</h2><button class="modal-close" onclick="closeAddCompanyModal()">✕</button></div>
    <div class="modal-body">
      <form id="add-co-form" onsubmit="submitAddCompany(event)">
        <div class="form-section">
          <div class="form-section-title">Identity</div>
          <div class="form-grid">
            <div class="config-field span-2"><label for="add-co-name">Company name *</label><input id="add-co-name" required /></div>
            <div class="config-field"><label for="add-co-ticker">Ticker *</label><input id="add-co-ticker" required placeholder="e.g. SCZ" /></div>
            <div class="config-field"><label for="add-co-exchange">Exchange *</label>
              <select id="add-co-exchange" required>
                <option value="TSXV">TSXV</option><option value="TSX">TSX</option><option value="CSE">CSE</option><option value="ASX">ASX</option>
              </select>
            </div>
            <div class="config-field"><label for="add-co-sedar">SEDAR ticker</label><input id="add-co-sedar" placeholder="If different from ticker" /></div>
            <div class="config-field"><label for="add-co-ms-slug">Morningstar slug</label><input id="add-co-ms-slug" placeholder="Optional" /></div>
          </div>
        </div>
        <div class="form-section">
          <div class="form-section-title">Market &amp; listing</div>
          <div class="form-grid">
            <div class="config-field"><label for="add-co-market-cap">Market cap (C$M)</label><input id="add-co-market-cap" type="number" step="any" placeholder="e.g. 125.5" /></div>
            <div class="config-field"><label for="add-co-total-float">Total float (M shares)</label><input id="add-co-total-float" type="number" step="any" /></div>
            <div class="config-field"><label for="add-co-shares">Shares outstanding</label><input id="add-co-shares" type="number" step="1" /></div>
            <div class="config-field"><label for="add-co-sector">Sector</label><input id="add-co-sector" placeholder="e.g. Gold" /></div>
            <div class="config-field"><label for="add-co-listing-date">Listing date</label><input id="add-co-listing-date" placeholder="YYYY-MM-DD or free text" /></div>
            <div class="config-field"><label for="add-co-region">Region</label><input id="add-co-region" placeholder="e.g. North America" /></div>
          </div>
        </div>
        <div class="form-section">
          <div class="form-section-title">Commodities</div>
          <div class="form-checks">
            <label><input type="checkbox" id="add-co-gold" /> Gold</label>
            <label><input type="checkbox" id="add-co-silver" /> Silver</label>
            <label><input type="checkbox" id="add-co-copper" /> Copper</label>
          </div>
        </div>
        <div class="form-section">
          <div class="form-section-title">Profile &amp; contact</div>
          <div class="form-grid">
            <div class="config-field span-2"><label for="add-co-description">Description</label><textarea id="add-co-description" rows="3" placeholder="Business summary"></textarea></div>
            <div class="config-field"><label for="add-co-website">Website</label><input id="add-co-website" type="url" placeholder="https://…" /></div>
            <div class="config-field"><label for="add-co-phone">Phone</label><input id="add-co-phone" placeholder="+1 …" /></div>
            <div class="config-field span-2"><label for="add-co-headquarters">Headquarters</label><input id="add-co-headquarters" placeholder="City, province/state, country" /></div>
            <div class="config-field span-2"><label for="add-co-transfer-agent">Transfer agent</label><input id="add-co-transfer-agent" placeholder="e.g. Computershare Trust Company" /></div>
          </div>
        </div>
        <div class="form-section">
          <div class="add-co-people-head">
            <div class="form-section-title" style="margin:0;border:none;padding:0;">Managers</div>
            <button type="button" class="btn btn-primary btn-sm" onclick="addCoPersonRow('manager')">+ Add manager</button>
          </div>
          <div class="add-co-people-wrap table-wrap" style="margin-bottom:14px;">
            <table>
              <thead><tr><th>Name</th><th>Title</th><th style="width:40px;"></th></tr></thead>
              <tbody id="add-co-managers-body">
                <tr class="empty-row"><td colspan="3">Optional — click &ldquo;+ Add manager&rdquo;.</td></tr>
              </tbody>
            </table>
          </div>
          <div class="add-co-people-head">
            <div class="form-section-title" style="margin:0;border:none;padding:0;">Directors</div>
            <button type="button" class="btn btn-primary btn-sm" onclick="addCoPersonRow('director')">+ Add director</button>
          </div>
          <div class="add-co-people-wrap table-wrap">
            <table>
              <thead><tr><th>Name</th><th>Title</th><th style="width:40px;"></th></tr></thead>
              <tbody id="add-co-directors-body">
                <tr class="empty-row"><td colspan="3">Optional — click &ldquo;+ Add director&rdquo;.</td></tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="add-co-form-actions">
          <button type="button" class="btn btn-ghost" onclick="closeAddCompanyModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Add company</button>
        </div>
      </form>
    </div>
  </div>
</div>
