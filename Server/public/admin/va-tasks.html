<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VA Tasks | OreWire Admin</title>
<link rel="stylesheet" href="/admin/css/admin.css" />
<style>
nav li a { color: inherit; text-decoration: none; display: flex; align-items: center; gap: 8px; width: 100%; }
.va-sev-critical { color: #dc2626; font-weight: 700; }
.va-sev-high { color: #c2410c; font-weight: 600; }
.va-sev-medium { color: var(--accent); }
.va-sev-low { color: var(--muted); }
/* Flat rows — no zebra striping on this page. */
.va-layout tbody tr:nth-child(even) { background: transparent; }
.va-layout tbody tr { background: transparent; }
.va-layout tbody tr:hover { background: var(--surface-2); }
.va-task-row-open { background: transparent; }
.va-task-row-later td:nth-child(5) { color: #a16207; font-weight: 600; }
.va-layout tbody tr.va-task-row-selected,
.va-layout tbody tr.va-task-row-selected:hover {
  background: #e2e8f0;
  box-shadow: inset 3px 0 0 var(--accent);
}
.va-task-detail { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; min-height: 200px; }
.va-task-detail-empty { color: var(--muted); font-size: 14px; padding: 24px; text-align: center; }
.va-task-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.va-layout { display: grid; grid-template-columns: 1fr 360px; gap: 16px; align-items: start; }
@media (max-width: 960px) { .va-layout { grid-template-columns: 1fr; } }
</style>
</head>
<body data-page="va-tasks">
<aside class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <h1>VA task list</h1>
    <p>Human-action items across Relay, pipelines, contact inbox, and more. Duplicate errors are grouped — one row per module.</p>
  </div>
  <div class="toolbar">
    <select id="va-filter">
      <option value="open">Open &amp; in progress</option>
      <option value="do_later">Do later</option>
      <option value="all">All tasks</option>
      <option value="done">Done / dismissed</option>
    </select>
    <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;">
      Per page
      <select id="va-limit" onchange="_vaPage=1;loadVaTasks()">
        <option value="20">20</option>
        <option value="25" selected>25</option>
        <option value="50">50</option>
        <option value="75">75</option>
        <option value="100">100</option>
      </select>
    </label>
    <button class="btn btn-primary btn-sm" type="button" onclick="syncVaTasks().then(() => loadVaTasks())">↻ Sync now</button>
    <button class="btn btn-ghost btn-sm" type="button" onclick="loadVaTasks()">Refresh list</button>
    <span id="va-open-count" style="margin-left:auto;font-size:12px;color:var(--muted);"></span>
  </div>
  <div class="va-layout">
    <div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Severity</th>
              <th>Module</th>
              <th>Task</th>
              <th>Count</th>
              <th>Status</th>
              <th>Last seen</th>
            </tr>
          </thead>
          <tbody id="va-tasks-body">
            <tr class="empty-row"><td colspan="6">Loading…</td></tr>
          </tbody>
        </table>
      </div>
      <div id="va-pagination" style="display:flex;align-items:center;gap:10px;margin-top:14px;justify-content:flex-end;">
        <span id="va-page-info" style="font-size:12px;color:var(--muted);"></span>
        <button class="btn btn-ghost btn-sm" id="va-prev" onclick="vaChangePage(-1)">← Prev</button>
        <button class="btn btn-ghost btn-sm" id="va-next" onclick="vaChangePage(1)">Next →</button>
      </div>
    </div>
    <div class="va-task-detail" id="va-task-detail">
      <div class="va-task-detail-empty">Select a task for details and actions</div>
    </div>
  </div>
</main>
<div id="toast"></div>
<script src="/admin/js/admin-sidebar.js"></script>
<script src="/admin/js/legacy-admin.js"></script>
</body>
</html>
