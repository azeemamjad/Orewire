<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Filings | OreWire Admin</title>
<link rel="stylesheet" href="/admin/css/admin.css" />
<style>
nav li a { color: inherit; text-decoration: none; display: flex; align-items: center; gap: 8px; width: 100%; }
.cron-builder { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
.cron-preview { font-size: 12px; color: var(--muted); margin-top: 6px; }
</style>
</head>
<body data-page="filings">
<aside class="sidebar"></aside>
<main class="main">
<!-- ── FILINGS ── -->
  <div id="page-filings" class="tab-content active">
    <div class="page-header">
      <h1>Filings</h1>
      <p>All downloaded and analyzed PDF filings</p>
    </div>

    <div class="preview-box" id="fi-pending-panel" style="margin-bottom:20px;">
      <div style="display:flex;flex-wrap:wrap;align-items:center;gap:12px;">
        <div style="flex:1;min-width:200px;">
          <div style="font-weight:600;margin-bottom:4px;">Process unanalyzed on disk</div>
          <div id="fi-pending-summary" style="font-size:13px;color:var(--muted);">Checking downloads…</div>
          <div id="fi-pending-job" style="font-size:12px;color:var(--muted);margin-top:6px;"></div>
        </div>
        <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;">
          Batch size
          <select id="fi-process-limit">
            <option value="10">10</option>
            <option value="25" selected>25</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </label>
        <button class="btn btn-primary btn-sm" type="button" id="fi-process-btn" onclick="startProcessPendingFilings()">Process pending</button>
        <button class="btn btn-ghost btn-sm" type="button" onclick="loadPendingOnDisk()">↻</button>
      </div>
    </div>

    <div class="toolbar">
      <input type="search" id="fi-search" placeholder="Search company…" oninput="_fiPage=1;loadFilings()" />
      <select id="fi-verdict" onchange="_fiPage=1;loadFilings()">
        <option value="">All verdicts</option>
        <option value="noteworthy">Noteworthy</option>
        <option value="watch">Watch</option>
        <option value="routine">Routine</option>
        <option value="extraction_failed">Extraction failed</option>
      </select>
      <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;">
        Per page
        <select id="fi-limit" onchange="_fiPage=1;loadFilings()">
          <option value="20">20</option>
          <option value="25" selected>25</option>
          <option value="50">50</option>
          <option value="75">75</option>
          <option value="100">100</option>
        </select>
      </label>
      <button class="btn btn-ghost btn-sm" onclick="loadFilings()">↻ Refresh</button>
      <span id="fi-count" class="text-muted" style="margin-left:auto;font-size:12px;"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Company</th><th>File</th><th>Type</th><th>Verdict</th><th>Ticker Summary</th><th>Status</th><th></th></tr></thead>
        <tbody id="filings-body"><tr class="empty-row"><td colspan="7">Loading…</td></tr></tbody>
      </table>
    </div>
    <div id="fi-pagination" style="display:flex;align-items:center;gap:10px;margin-top:14px;justify-content:flex-end;">
      <span id="fi-page-info" style="font-size:12px;color:var(--muted);"></span>
      <button class="btn btn-ghost btn-sm" id="fi-prev" onclick="fiChangePage(-1)">← Prev</button>
      <button class="btn btn-ghost btn-sm" id="fi-next" onclick="fiChangePage(1)">Next →</button>
    </div>
  </div>

  
</main>
<!-- ── FILING DETAIL MODAL ── -->
<div class="modal-backdrop" id="filing-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Filing Detail</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body">Loading…</div>
  </div>
</div>

<!-- ── EDIT COMPANY PROFILE MODAL ── -->
<div class="modal-backdrop" id="profile-modal" onclick="if(event.target===this)closeProfileModal()">
  <div class="modal" style="max-width:900px;">
    <div class="modal-header">
      <h2 id="profile-modal-title">Edit Company Profile</h2>
      <button class="modal-close" onclick="closeProfileModal()">✕</button>
    </div>
    <div class="modal-body" id="profile-modal-body">Loading…</div>
  </div>
</div>



<div id="toast"></div>
<script src="/admin/js/cron-schedule.js"></script>
<script src="/admin/js/admin-sidebar.js?v=20260720"></script>
<script src="/admin/js/legacy-admin.js"></script>
</body>
</html>
