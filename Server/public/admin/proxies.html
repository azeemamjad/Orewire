<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Proxies | OreWire Admin</title>
<link rel="stylesheet" href="/admin/css/admin.css" />
<style>
nav li a { color: inherit; text-decoration: none; display: flex; align-items: center; gap: 8px; width: 100%; }
.proxy-actions { display: flex; flex-wrap: wrap; gap: 4px; }
.tier-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.tier-tag.dc { background: #dbeafe; color: #2563eb; }
.tier-tag.res { background: #fef3c7; color: var(--gold); }
.tier-tag.direct { background: #f1f5f9; color: #64748b; }
.proxy-enabled { color: #16a34a; }
.proxy-disabled { color: var(--muted); }
.proxy-direct-row td { color: var(--muted); font-style: italic; }
.usage-error {
  font-size: 12px;
  color: #dc2626;
  max-width: 420px;
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.4;
}
.usage-log-section { margin-top: 32px; }
.usage-log-section h2 { font-size: 18px; margin-bottom: 8px; }
</style>
</head>
<body data-page="proxies">
<aside class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <h1>Browser proxies</h1>
    <p>Manage Relay pool proxies — one browser per enabled proxy plus one fixed direct (local IP) browser (<span id="proxies-total">0</span> configured)</p>
  </div>
  <div class="toolbar">
    <button class="btn btn-primary btn-sm" type="button" onclick="openProxyModal()">+ Add proxy</button>
    <button class="btn btn-ghost btn-sm" type="button" onclick="rebuildProxyPool()">↻ Rebuild pool</button>
    <button class="btn btn-ghost btn-sm" type="button" onclick="loadProxies()">Refresh</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Tier</th>
          <th>Host</th>
          <th>Username</th>
          <th>Enabled</th>
          <th>Sessions</th>
          <th>Errors</th>
          <th>Last used</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="proxies-body">
        <tr class="empty-row"><td colspan="9">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="usage-log-section">
    <h2>Usage log <span style="font-size:13px;font-weight:normal;color:var(--muted);">(last <span id="proxy-retention-days">3</span> days)</span></h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Proxy</th>
            <th>Worker</th>
            <th>Task</th>
            <th>Status</th>
            <th>Error</th>
            <th>When</th>
          </tr>
        </thead>
        <tbody id="proxy-usage-body">
          <tr class="empty-row"><td colspan="6">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<div class="modal-backdrop" id="proxy-modal" onclick="if(event.target===this)closeProxyModal()">
  <div class="modal" style="max-width:520px;">
    <div class="modal-header">
      <h2 id="proxy-modal-title">Add proxy</h2>
      <button class="modal-close" type="button" onclick="closeProxyModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="proxy-form" onsubmit="submitProxy(event)">
        <input type="hidden" id="px-id" value="" />
        <div class="form-grid" style="grid-template-columns:1fr 1fr;">
          <div class="config-field span-2"><label for="px-name">Name *</label><input id="px-name" required placeholder="Oxylabs DC :8001" /></div>
          <div class="config-field"><label for="px-tier">Tier *</label>
            <select id="px-tier" required>
              <option value="datacenter">Datacenter</option>
              <option value="residential">Residential</option>
            </select>
          </div>
          <div class="config-field"><label for="px-sort">Sort order</label><input id="px-sort" type="number" value="0" /></div>
          <div class="config-field"><label for="px-host">Host *</label><input id="px-host" required placeholder="dc.oxylabs.io" /></div>
          <div class="config-field"><label for="px-port">Port *</label><input id="px-port" type="number" required min="1" max="65535" placeholder="8001" /></div>
          <div class="config-field span-2"><label for="px-username">Username</label><input id="px-username" autocomplete="off" /></div>
          <div class="config-field span-2"><label for="px-password">Password</label><input id="px-password" type="password" autocomplete="new-password" placeholder="Leave blank to keep existing (edit only)" /></div>
          <div class="config-field span-2"><label for="px-sessid">Sessid (residential sticky IP)</label><input id="px-sessid" placeholder="relayres1" /></div>
        </div>
        <label style="display:flex;align-items:center;gap:8px;margin:14px 0;font-size:14px;">
          <input type="checkbox" id="px-enabled" checked /> Enabled (spawn browser in pool)
        </label>
        <div style="text-align:right;">
          <button type="button" class="btn btn-ghost btn-sm" onclick="closeProxyModal()">Cancel</button>
          <button type="submit" class="btn btn-primary btn-sm">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="/admin/js/admin-sidebar.js"></script>
<script src="/admin/js/legacy-admin.js"></script>
</body>
</html>
