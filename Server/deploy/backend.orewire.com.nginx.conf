# OreWire backend — backend.orewire.com → Node :3000
# Install: sudo cp backend.orewire.com.nginx.conf /etc/nginx/sites-available/backend.orewire.com
#          sudo ln -sf /etc/nginx/sites-available/backend.orewire.com /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# The map block must live in http {} — if this file is included as a site,
# add the map to /etc/nginx/nginx.conf inside http { } instead (see comment below).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl http2;
    server_name backend.orewire.com;

    ssl_certificate /etc/letsencrypt/live/backend.orewire.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backend.orewire.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Optional: limit upload size for admin uploads
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (OreWire Relay live view: /relay/ws)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;

        # Keep Relay viewer sessions open
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

server {
    listen 80;
    server_name backend.orewire.com;

    # Redirect HTTP → HTTPS (Certbot-style)
    return 301 https://$host$request_uri;
}
